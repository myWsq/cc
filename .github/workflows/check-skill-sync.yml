name: check-skill-sync

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: skills/ and plugins/dev/skills/ must be identical
        run: |
          if ! diff -r skills plugins/dev/skills; then
            echo "::error::skills/ and plugins/dev/skills/ have drifted. Run: rm -rf plugins/dev/skills && cp -R skills plugins/dev/skills"
            exit 1
          fi
